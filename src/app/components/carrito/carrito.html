<section class = "cart">
    <h2 class = "title">Carrito</h2>

    @if (carrito().length === 0 ) {
        <p class="empty">Tu carrito esta vacio.</p>
    }@else {
        <ul class="list">
            @for(producto of carrito(); track producto.id){
                <li class="item">
                    <span class="line">
                        {{producto.name}} - {{producto.price | currency:'MXN'}}
                    </span>

                    <button class="btn danger" (click)="quitar(producto.id)">
                        Quitar
                    </button>
                </li>
            }
        </ul>
        <div class="total">
            Total: {{total()|currency:'MXN'}}
        </div>
        <div class="actions">            
            <button class="btn purple" (click)="vaciar()" >Vaciar carrito</button>
            <button class="btn" (click)="exportarXML()">Exportar XML</button>
        </div>
    }
</section>
